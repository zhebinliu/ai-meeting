version: '3.8'

services:
  backend:
    build: .
    restart: always
    env_file:
      - .env
    volumes:
      - ./meeting_ai.db:/app/meeting_ai.db
      - ./uploads:/app/uploads
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8085:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  uploads:
