name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migrate:
        description: "跳过数据库迁移"
        type: boolean
        default: false
      skip_restart:
        description: "跳过服务重启"
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync code to server
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude-from=".rsyncignore" \
            --delete \
            ./ "$SSH_USER@$SSH_HOST:$REMOTE_DIR/"

      - name: Run database migration
        if: ${{ github.event_name == 'push' || inputs.skip_migrate == false }}
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            REMOTE_DIR="$REMOTE_DIR" python3 - <<'PYEOF'
          import sqlite3, os
          db = os.path.join(os.environ['REMOTE_DIR'], 'meeting_ai.db')
          if not os.path.exists(db):
              print("    数据库不存在，将由应用自动创建")
              raise SystemExit(0)
          conn = sqlite3.connect(db)
          c = conn.cursor()
          c.execute('PRAGMA table_info(meetings)')
          cols = [r[1] for r in c.fetchall()]
          migrations = {
              'total_chunks':        'INTEGER NOT NULL DEFAULT 0',
              'done_chunks':         'INTEGER NOT NULL DEFAULT 0',
              'asr_engine':          'VARCHAR(32)',
              'bitable_app_token':   'VARCHAR(128)',
              'feishu_url':          'TEXT',
              'created_at':          'DATETIME',
              'polished_transcript': 'TEXT',
              'meeting_minutes':     'TEXT',
          }
          added = []
          for col, typedef in migrations.items():
              if col not in cols:
                  c.execute(f'ALTER TABLE meetings ADD COLUMN {col} {typedef}')
                  added.append(col)
          conn.commit()
          conn.close()
          print(f"    ✓ 已添加字段: {', '.join(added)}" if added else "    ✓ 数据库已是最新")
          PYEOF

      - name: Restart service
        if: ${{ github.event_name == 'push' || inputs.skip_restart == false }}
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SERVICE_NAME: ${{ secrets.DEPLOY_SERVICE_NAME }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "sudo systemctl restart $SERVICE_NAME"
          sleep 3

      - name: Verify service health
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SERVICE_NAME: ${{ secrets.DEPLOY_SERVICE_NAME }}
        run: |
          STATUS=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "sudo systemctl is-active $SERVICE_NAME" 2>/dev/null || echo "unknown")
          echo "Service status: $STATUS"
          if [ "$STATUS" != "active" ]; then
            echo "::error::服务状态异常: $STATUS"
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
              "sudo journalctl -u $SERVICE_NAME -n 30 --no-pager"
            exit 1
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
