name: Setup SSL Certificate (Let's Encrypt)

on:
  workflow_dispatch:
    inputs:
      domain:
        description: "域名（默认 meeting.liii.in）"
        required: false
        default: "meeting.liii.in"
      email:
        description: "Let's Encrypt 通知邮箱"
        required: false
        default: "liu@zheb.in"
      dry_run:
        description: "Dry run — 仅验证流程，不真正申请证书"
        type: boolean
        default: false

jobs:
  setup-ssl:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Show current nginx config (diagnostics)
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" bash << 'ENDSSH'
          echo "=== Active nginx configs ==="
          sudo nginx -T 2>/dev/null | grep -E "server_name|listen|ssl" | head -30 || true
          echo "=== Open ports ==="
          ss -tlnp | grep nginx || true
          ENDSSH

      - name: Install certbot
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" bash << 'ENDSSH'
          set -e
          if ! command -v certbot &>/dev/null; then
            echo "Installing certbot..."
            sudo apt-get update -q
            sudo apt-get install -y certbot python3-certbot-nginx
          else
            echo "certbot $(certbot --version 2>&1) already installed"
          fi
          ENDSSH

      - name: Ensure server_name is set in nginx config
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          DOMAIN: ${{ inputs.domain }}
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            DOMAIN="$DOMAIN" REMOTE_DIR="$REMOTE_DIR" bash << 'ENDSSH'
          set -e
          CONF="/etc/nginx/sites-available/meeting-ai"

          # Check if our domain is already in any nginx config
          if sudo nginx -T 2>/dev/null | grep -q "server_name.*$DOMAIN"; then
            echo "✓ server_name $DOMAIN already present in nginx config"
            exit 0
          fi

          echo "server_name $DOMAIN not found — creating/updating $CONF"
          sudo tee "$CONF" > /dev/null << NGINXEOF
server {
    listen 80;
    server_name $DOMAIN;
    client_max_body_size 1024M;

    location / {
        root $REMOTE_DIR/frontend;
        index index.html;
        try_files \$uri \$uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host \$host;
        proxy_read_timeout 3600s;
    }
}
NGINXEOF
          sudo ln -sf "$CONF" /etc/nginx/sites-enabled/meeting-ai
          sudo nginx -t
          sudo systemctl reload nginx
          echo "✓ nginx config created and reloaded"
          ENDSSH

      - name: Obtain SSL certificate via certbot --nginx
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          DOMAIN: ${{ inputs.domain }}
          EMAIL: ${{ inputs.email }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            DOMAIN="$DOMAIN" EMAIL="$EMAIL" DRY_RUN="$DRY_RUN" bash << 'ENDSSH'
          set -e
          DRY_FLAG=""
          [ "$DRY_RUN" = "true" ] && DRY_FLAG="--dry-run"

          sudo certbot --nginx \
            --non-interactive \
            --agree-tos \
            --email "$EMAIL" \
            -d "$DOMAIN" \
            --redirect \
            $DRY_FLAG

          echo "✓ Certificate obtained and nginx updated"
          ENDSSH

      - name: Setup auto-renewal
        if: ${{ inputs.dry_run == false }}
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" bash << 'ENDSSH'
          # systemd timer (preferred on Ubuntu 20+)
          if systemctl list-unit-files certbot.timer &>/dev/null; then
            sudo systemctl enable --now certbot.timer
            echo "✓ certbot.timer enabled (systemd auto-renewal)"
          else
            # Fallback: cron
            if ! crontab -l 2>/dev/null | grep -q 'certbot renew'; then
              (crontab -l 2>/dev/null; echo "0 3,15 * * * sudo certbot renew --quiet --deploy-hook 'systemctl reload nginx'") | crontab -
              echo "✓ certbot renew cron added"
            else
              echo "✓ certbot renew cron already exists"
            fi
          fi
          ENDSSH

      - name: Final status
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          DOMAIN: ${{ inputs.domain }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            DOMAIN="$DOMAIN" bash << 'ENDSSH'
          echo "=== Certificate Status ==="
          sudo certbot certificates 2>/dev/null | grep -A6 "$DOMAIN" || echo "(dry run)"
          echo ""
          echo "=== nginx status ==="
          sudo systemctl is-active nginx && echo "nginx: active" || echo "nginx: INACTIVE"
          echo ""
          echo "=== Listening ports ==="
          ss -tlnp | grep -E ':80|:443' || true
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
