name: Setup SSL Certificate (Let's Encrypt)

on:
  workflow_dispatch:
    inputs:
      domain:
        description: "域名（默认 meeting.liii.in）"
        required: false
        default: "meeting.liii.in"
      email:
        description: "Let's Encrypt 通知邮箱"
        required: false
        default: "liu@zheb.in"
      dry_run:
        description: "Dry run — 仅验证，不真正申请证书"
        type: boolean
        default: false

jobs:
  setup-ssl:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Show current nginx config (diagnostics)
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" \
            "sudo nginx -T 2>/dev/null | grep -E 'server_name|listen|ssl_cert' | head -30; echo '---'; ss -tlnp | grep nginx || true"

      - name: Install certbot
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" \
            "command -v certbot || (sudo apt-get update -q && sudo apt-get install -y certbot python3-certbot-nginx)"

      - name: Deploy nginx config if server_name not set
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_HOST_RAW: ${{ secrets.DEPLOY_HOST }}
          DOMAIN: ${{ inputs.domain }}
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
        run: |
          # Check if the domain is already in nginx config
          HAS_DOMAIN=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" \
            "sudo nginx -T 2>/dev/null | grep -c 'server_name.*$DOMAIN' || true")

          if [ "${HAS_DOMAIN:-0}" -gt 0 ]; then
            echo "server_name $DOMAIN already present — skipping nginx config update"
          else
            echo "Deploying nginx config for $DOMAIN..."
            # Substitute placeholders in template
            sed "s|__DOMAIN__|$DOMAIN|g; s|__ROOT_DIR__|$REMOTE_DIR|g" \
              nginx/meeting-ai.conf > /tmp/meeting-ai-rendered.conf

            # Copy to server
            scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              /tmp/meeting-ai-rendered.conf \
              "$SSH_USER@$SSH_HOST:/tmp/meeting-ai.conf"

            # Install into nginx
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              "$SSH_USER@$SSH_HOST" \
              "sudo mv /tmp/meeting-ai.conf /etc/nginx/sites-available/meeting-ai && \
               sudo ln -sf /etc/nginx/sites-available/meeting-ai /etc/nginx/sites-enabled/meeting-ai && \
               sudo nginx -t && sudo systemctl reload nginx && echo 'nginx config deployed'"
          fi

      - name: Obtain SSL certificate
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          DOMAIN: ${{ inputs.domain }}
          EMAIL: ${{ inputs.email }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          DRY_FLAG=""
          if [ "$DRY_RUN" = "true" ]; then DRY_FLAG="--dry-run"; fi

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" \
            "sudo certbot --nginx \
              --non-interactive --agree-tos \
              --email '$EMAIL' \
              -d '$DOMAIN' \
              --redirect \
              $DRY_FLAG"

      - name: Enable auto-renewal
        if: ${{ inputs.dry_run != true }}
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" \
            "systemctl list-unit-files certbot.timer &>/dev/null \
              && sudo systemctl enable --now certbot.timer \
              || (crontab -l 2>/dev/null | grep -q 'certbot renew' \
                  || (crontab -l 2>/dev/null; echo '0 3,15 * * * sudo certbot renew --quiet --deploy-hook systemctl reload nginx') | crontab -); \
             echo 'auto-renewal configured'"

      - name: Final status
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          DOMAIN: ${{ inputs.domain }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" \
            "echo '=== Cert ==='; sudo certbot certificates 2>/dev/null | grep -A5 '$DOMAIN' || echo '(dry-run, no cert)'; \
             echo '=== nginx ==='; sudo systemctl is-active nginx; \
             echo '=== Ports ==='; ss -tlnp | grep -E ':80|:443' || true"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
